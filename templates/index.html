<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Guide Generator</title>

  <!-- Quill snow theme -->
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet" />

  <link rel="stylesheet" href="/static/style.css?v=2" />
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>&#128196; Teacher Guide Generator</h1>
    <p>Paste a public Google Slides link &rarr; Gemini reads the slides &rarr; Edit &amp; export</p>
  </div>

  <!-- Input Card -->
  <div class="card">
    <label for="drive-link-input" style="display:block;font-weight:600;margin-bottom:.5rem;">
      Google Slides Link <small style="font-weight:400;color:#6b7280;">(must be publicly shared)</small>
    </label>
    <input
      type="url"
      id="drive-link-input"
      placeholder="https://docs.google.com/presentation/d/…/edit"
      style="width:100%;box-sizing:border-box;padding:.65rem .9rem;border:1.5px solid #d1d5db;border-radius:8px;font-size:.95rem;outline:none;margin-bottom:1rem;"
    />

    <div class="alert alert-error" id="error-box"></div>

    <div class="spinner-wrap" id="spinner">
      <div class="spinner"></div>
      <p class="spinner-msg" id="spinner-msg">Sending to Gemini AI...</p>
    </div>

    <button class="btn btn-full" id="generate-btn">&#128640; Generate Teacher Guide</button>
  </div>

  <!-- Editor (shown after generation) -->
  <div id="editor-section">
    <div class="card">

      <div class="guide-meta">
        <div>
          <div class="guide-meta-title" id="guide-title">Teacher Guide</div>
          <div class="guide-meta-sub">All content is editable. Use the toolbar to format text.</div>
        </div>
        <div class="btn-row" style="margin-top:0; gap:.6rem;">
          <button class="btn btn-pdf" id="pdf-btn">&#128462; Export PDF</button>
        </div>
      </div>

      <!-- Quill editor container -->
      <div id="quill-editor"></div>

    </div>
  </div>
  <!-- /editor-section -->

  <p class="footer">Powered by FastAPI &middot; Gemini 2.0 Flash &middot; ReportLab</p>

</div>
<!-- /container -->

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script src="/static/app.js?v=3"></script>
</body>
</html>
